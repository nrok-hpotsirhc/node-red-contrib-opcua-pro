name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit + integration tests
        run: npm test

      - name: Check code coverage (≥85%)
        run: npx c8 check-coverage --lines 85 --functions 85 --branches 80

      - name: Lint
        run: npm run lint

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=moderate
      - name: Check for credentials in code
        run: |
          # Fail if any private key material appears in source files
          if grep -rn "BEGIN PRIVATE KEY\|BEGIN RSA PRIVATE KEY\|password.*=.*['\"].\{8,\}" nodes/ lib/ --include="*.js"; then
            echo "Potential credential leak detected!"
            exit 1
          fi
