<script type="text/javascript">
  (function() {
    'use strict';

    RED.nodes.registerType('opcua-client-config', {
      category: 'config',
      defaults: {
        name:                   { value: '' },
        endpoint:               { value: 'opc.tcp://localhost:4840', required: true },
        securityMode:           { value: 'SignAndEncrypt', required: true },
        securityPolicy:         { value: 'Basic256Sha256', required: true },
        authMode:               { value: 'Anonymous' },
        applicationName:        { value: 'Node-RED OPC UA Client' },
        requestedSessionTimeout:{ value: 60000, validate: RED.validators.number() }
      },
      credentials: {
        username: { type: 'text' },
        password: { type: 'password' }
      },
      label: function() {
        return this.name || this.endpoint || 'opcua-client-config';
      },
      oneditprepare: function() {
        // Show/hide username+password fields based on auth mode
        function updateAuthFields() {
          const mode = $('#node-config-input-authMode').val();
          const show = (mode === 'UserName');
          $('#row-username, #row-password').toggle(show);
        }
        $('#node-config-input-authMode').on('change', updateAuthFields);
        updateAuthFields();
      }
    });
  }());
</script>

<script type="text/html" data-template-name="opcua-client-config">
  <div class="form-row">
    <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-config-input-name" placeholder="Name (optional)">
  </div>
  <div class="form-row">
    <label for="node-config-input-endpoint"><i class="fa fa-server"></i> Endpoint URL</label>
    <input type="text" id="node-config-input-endpoint" placeholder="opc.tcp://192.168.1.100:4840" style="width:70%">
  </div>
  <hr/>
  <div class="form-row">
    <label for="node-config-input-securityMode"><i class="fa fa-lock"></i> Security Mode</label>
    <select id="node-config-input-securityMode" style="width:70%">
      <option value="None">None (unsecured — dev only)</option>
      <option value="Sign">Sign</option>
      <option value="SignAndEncrypt" selected>SignAndEncrypt (recommended)</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-securityPolicy"><i class="fa fa-shield"></i> Security Policy</label>
    <select id="node-config-input-securityPolicy" style="width:70%">
      <option value="None">None</option>
      <option value="Basic256Sha256" selected>Basic256Sha256 (recommended)</option>
      <option value="Aes128_Sha256_RsaOaep">Aes128_Sha256_RsaOaep</option>
      <option value="Aes256_Sha256_RsaPss">Aes256_Sha256_RsaPss</option>
    </select>
  </div>
  <hr/>
  <div class="form-row">
    <label for="node-config-input-authMode"><i class="fa fa-user"></i> Authentication</label>
    <select id="node-config-input-authMode" style="width:70%">
      <option value="Anonymous">Anonymous</option>
      <option value="UserName">Username / Password</option>
      <option value="Certificate">Certificate</option>
    </select>
  </div>
  <div class="form-row" id="row-username">
    <label for="node-config-input-username"><i class="fa fa-user-circle"></i> Username</label>
    <input type="text" id="node-config-input-username">
  </div>
  <div class="form-row" id="row-password">
    <label for="node-config-input-password"><i class="fa fa-key"></i> Password</label>
    <input type="password" id="node-config-input-password">
  </div>
  <hr/>
  <div class="form-row">
    <label for="node-config-input-applicationName"><i class="fa fa-info-circle"></i> Application Name</label>
    <input type="text" id="node-config-input-applicationName" placeholder="Node-RED OPC UA Client">
  </div>
  <div class="form-row">
    <label for="node-config-input-requestedSessionTimeout"><i class="fa fa-clock-o"></i> Session Timeout (ms)</label>
    <input type="number" id="node-config-input-requestedSessionTimeout" min="5000" step="1000">
  </div>
</script>

<script type="text/html" data-help-name="opcua-client-config">
  <p>Central OPC UA connection configuration node. Manages a single shared session for all worker nodes (read, write, subscribe, method).</p>
  <h3>Properties</h3>
  <dl class="message-properties">
    <dt>Endpoint URL</dt><dd>OPC UA server endpoint, e.g. <code>opc.tcp://192.168.1.100:4840</code></dd>
    <dt>Security Mode</dt><dd><code>SignAndEncrypt</code> is strongly recommended for production use.</dd>
    <dt>Security Policy</dt><dd>Cryptographic algorithm suite. <code>Basic256Sha256</code> or higher.</dd>
    <dt>Authentication</dt><dd>Anonymous, Username/Password, or Certificate-based user identity.</dd>
  </dl>
  <h3>Architecture</h3>
  <p>This node implements a Finite State Machine:
  <code>DISCONNECTED → CONNECTING → CONNECTED → SESSION_ACTIVE ↔ CONNECTION_LOST → RECONNECTING</code></p>
  <p>All dependent worker nodes share this single session. Reconnect uses exponential backoff. Certificate management via the Security Dashboard.</p>
</script>
